{% extends "public/public_base.html" %}
{% block content %}
<div class="card" style="max-width:500px; margin:40px auto; padding:24px;">
    <h2 style="margin:0 0 12px;">Password updated</h2>
    <p style="margin:0 0 18px; color:var(--muted); line-height:1.5;">
        Your password has been successfully changed.
        Please login with your new password to access your account.
    </p>
    <a href="{% url 'login' %}" style="display:inline-block; padding:10px 16px; background:var(--text); color:white; border-radius:6px; font-weight:700;">
        Return to login
    </a>

</div>
{% endblock %}
