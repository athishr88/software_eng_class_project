{% extends "public/public_base.html"%}
{% block content %}

<div class="card" style="max-width:500px; margin:40px auto; padding:24px;">
    <h2 style="margin:0 0 16px;">Forgot Password</h2>Reset Link
    <p style="margin:0 0 24px; color:var(--muted);">Enter your email address to continue.</p>
    
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom:16px;">
                <label for="{{ field.id_for_label }}" style="display:block; margin-bottom:4px; font-weight:500;">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <p style="margin:6px 0 0; color:#8a1f1f; font-size:14px;">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" style="background:var(--primary); color:#fff; border:none; padding:10px 16px; border-radius:4px; cursor:pointer;">Continue</button>
    </form>
</div>
{% endblock %}
