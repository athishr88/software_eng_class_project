{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login | PassItOn Books Admin</title>
  <link rel="stylesheet" href="{% static 'css/site_header.css' %}" />
  <link rel="stylesheet" href="{% static 'dashboard/admin_dashboard.css' %}" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
    .staff-login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg, #f6f7fb); padding: 24px; }
    .staff-login-card { background: var(--card, #fff); border-radius: var(--radius, 14px); padding: 32px; max-width: 380px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid var(--border, #d1d5db); }
    .staff-login-card h1 { margin: 0 0 8px; font-size: 20px; font-weight: 800; }
    .staff-login-card .sub { margin: 0 0 24px; color: var(--muted, #6b7280); font-size: 14px; }
    .staff-login-card label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    .staff-login-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 16px; box-sizing: border-box; }
    .staff-login-card .error { color: #b91c1c; font-size: 14px; margin-bottom: 12px; }
    .staff-login-card button { width: 100%; padding: 12px; background: rgb(93, 23, 37); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .staff-login-card button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  {% include "includes/site_header.html" with show_search=0 portal="staff_login" %}
  <div class="staff-login-wrap">
    <div class="staff-login-card">
      <h1>Staff Login</h1>
      <p class="sub">PassItOn Books Admin</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="{% url 'staff_login' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}">
        {% csrf_token %}
        {% if request.GET.next %}<input type="hidden" name="next" value="{{ request.GET.next }}" />{% endif %}
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required autocomplete="username" placeholder="admin@example.com" value="{{ email|default:'' }}" />
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        <button type="submit">Log in</button>
      </form>
    </div>
  </div>
</body>
</html>
